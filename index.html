<!DOCTYPE html>
<html>
<head>
    <title>Radar System Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
        #info { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 18px; }
    </style>
</head>
<body>
    <div id="info">STATUS: SCANNING...</div>
    <script>
        const socket = io();
        let angle = 0, distance = 0;

        socket.on('radarData', (data) => {
            let parts = data.split(",");
            angle = parseInt(parts[0]);
            distance = parseInt(parts[1]);
        });

        function setup() {
            createCanvas(windowWidth, windowHeight);
            angleMode(DEGREES);
        }

        function draw() {
            fill(0, 15); // Trail effect
            noStroke();
            rect(0, 0, width, height);
            
            translate(width / 2, height - 100);
            
            // Draw Radar Grids
            stroke(0, 100, 0);
            noFill();
            for (let r = 1; r <= 4; r++) {
                arc(0, 0, (width * 0.8) * (r/4), (width * 0.8) * (r/4), 180, 360);
            }

            // Draw Sweeping Line
            stroke(0, 255, 0);
            strokeWeight(3);
            let lineLength = width * 0.4;
            line(0, 0, lineLength * cos(180 + angle), lineLength * sin(180 + angle));

            // Draw Target (Red Dot)
            if (distance > 0 && distance < 40) {
                let dMapped = map(distance, 0, 40, 0, lineLength);
                fill(255, 0, 0);
                noStroke();
                circle(dMapped * cos(180 + angle), dMapped * sin(180 + angle), 12);
            }
        }
    </script>
</body>
</html>
