<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>G1 RADAR SYSTEM | HUD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .stats { position: absolute; top: 20px; left: 20px; border-left: 3px solid #00ff00; padding-left: 15px; }
        .title { position: absolute; top: 20px; right: 20px; text-align: right; }
    </style>
</head>
<body>
    <div class="stats">
        <div id="angleDisplay">ANGLE: 000°</div>
        <div id="distDisplay">RANGE: 000 cm</div>
    </div>
    <div class="title">
        <b>SYSTEM STATUS: <span style="color: #00ff00;">WIRELESS ACTIVE</span></b><br>
        BATT: 9.2V | SIGNAL: HC-05
    </div>

    <script>
        let socket;
        let angle = 0, distance = 0;
        let history = []; // Stores past detections for the "fading" trail

        function setup() {
            createCanvas(windowWidth, windowHeight);
            socket = io("http://localhost:3000");
            
            socket.on('radarData', (data) => {
                let parts = data.split(',');
                angle = parseInt(parts[0]);
                distance = parseInt(parts[1]);
                
                // Add current scan to history
                history.push({a: angle, d: distance, t: millis()});
                
                // Update text HUD
                document.getElementById('angleDisplay').innerText = "ANGLE: " + angle.toString().padStart(3, '0') + "°";
                document.getElementById('distDisplay').innerText = "RANGE: " + (distance < 40 ? distance + " cm" : "SCANNING...");
            });
        }

        function draw() {
            background(5, 5, 5, 25); // Motion blur trail
            translate(width/2, height - 80);

            // Draw Radar Arcs (The background grid)
            strokeWeight(1);
            stroke(0, 150, 0, 50);
            for(let i=1; i<=4; i++) arc(0, 0, i*400, i*400, PI, TWO_PI);
            line(-width/2, 0, width/2, 0); // Base line

            // Draw Sweep Line (The moving beam)
            let rad = radians(angle + 180);
            stroke(0, 255, 0, 180);
            strokeWeight(4);
            line(0, 0, 800 * cos(rad), 800 * sin(rad));

            // Draw Target Detections
            for(let i = history.length - 1; i >= 0; i--) {
                let h = history[i];
                let age = millis() - h.t;
                let opacity = map(age, 0, 2000, 255, 0); // Fade after 2 seconds

                if(opacity < 0) {
                    history.splice(i, 1);
                    continue;
                }

                if(h.d < 40) { // Only draw if target is in range
                    let targetX = (h.d * 20) * cos(radians(h.a + 180));
                    let targetY = (h.d * 20) * sin(radians(h.a + 180));
                    
                    fill(255, 0, 0, opacity);
                    noStroke();
                    ellipse(targetX, targetY, 12, 12);
                    
                    // Add a pulse ring for the newest targets
                    if(age < 200) {
                        stroke(255, 0, 0, opacity);
                        noFill();
                        ellipse(targetX, targetY, age/5, age/5);
                    }
                }
            }
        }
    </script>
</body>
</html>
